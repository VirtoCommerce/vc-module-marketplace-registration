# v2.0.0
name: Build Registration Module

runs:
  using: composite

  steps:

    - name: Install dependencies for Registration Module
      shell: bash
      working-directory: src/VirtoCommerce.MarketplaceRegistrationModule.Web/vcmp-registration
      run: yarn

    - name: Compile API client (produces src/api_client/dist consumed by exports)
      shell: bash
      working-directory: src/VirtoCommerce.MarketplaceRegistrationModule.Web/vcmp-registration/src/api_client
      run: npx tsc

    - name: Build Registration Module
      shell: bash
      working-directory:  src/VirtoCommerce.MarketplaceRegistrationModule.Web/vcmp-registration
      run: yarn build:modules-bundle
